name: Generate KPI Dashboard

on:
  schedule:
    - cron: '0 14 * * *'   # 6am PT daily (UTC-8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCREENSHOT_DIR: /tmp/kpi-screenshots
      DASHBOARD_OUT: dashboard.html
      SKINSAGE_MANGOMINT_COOKIES: ${{ secrets.SKINSAGE_MANGOMINT_COOKIES }}
      WAXON_MANGOMINT_COOKIES: ${{ secrets.WAXON_MANGOMINT_COOKIES }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get month key for cache
        id: date
        run: echo "ym=$(date -u +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Cache node_modules and Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Restore prior-month KPI data cache
        uses: actions/cache@v4
        with:
          path: data-cache.json
          key: kpi-data-${{ steps.date.outputs.ym }}
          restore-keys: kpi-data-

      - name: Scrape KPI data
        run: node src/scraper.js

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kpi-dashboard
          path: dashboard.html
          retention-days: 30
          if-no-files-found: warn

      - name: Push dashboard to dist branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin
          if git ls-remote --exit-code origin dist; then
            git worktree add /tmp/dist origin/dist
          else
            git worktree add --orphan /tmp/dist dist
          fi
          cp dashboard.html /tmp/dist/dashboard.html
          cd /tmp/dist
          git add dashboard.html
          git diff --staged --quiet || git commit -m "Update dashboard $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin HEAD:dist

      - name: Upload screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kpi-screenshots
          path: /tmp/kpi-screenshots/
          retention-days: 7

name: Probe2 — Report Outputs

on:
  workflow_dispatch:
    inputs:
      account:
        description: 'Which account to probe'
        required: false
        default: 'both'
        type: choice
        options: [both, skinsage, waxon]

jobs:
  probe2:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SCREENSHOT_DIR: /tmp/kpi-probe2-screenshots
      PROBE_ACCOUNT: ${{ inputs.account }}
      SKINSAGE_MANGOMINT_COOKIES: ${{ secrets.SKINSAGE_MANGOMINT_COOKIES }}
      WAXON_MANGOMINT_COOKIES: ${{ secrets.WAXON_MANGOMINT_COOKIES }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run probe2
        run: node src/probe2.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe2-results
          path: /tmp/kpi-probe2-screenshots/
          retention-days: 7
